<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🏆 Copa 2026 | Simulação Avançada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ccircle cx='50' cy='52' r='32' fill='none' stroke='%23f59e0b' stroke-width='5'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='42'%3E🏆%3C/text%3E%3Ctext x='50' y='36' text-anchor='middle' font-size='22' font-family='sans-serif' fill='%23fbbf24' font-weight='bold'%3E26%3C/text%3E%3Ccircle cx='74' cy='30' r='7' fill='%23fcd34d'/%3E%3C/svg%3E">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-gold: #f59e0b;
            --accent-gold-light: #fbbf24;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 23, 42, 0.85);
            --card-radius: 20px;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-glow: 0 0 15px rgba(245, 158, 11, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(15,23,42,1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30,41,59,0.8) 0px, transparent 50%);
            background-attachment: fixed;
            margin: 0; padding: 0 0 40px 0;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 10px; }

        /* HEADER */
        .header-wrapper {
            position: sticky; top: 0; z-index: 100;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            padding: 14px 16px; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .header-wrapper h1 {
            font-size: 1.4rem; font-weight: 800; margin: 0;
            display: flex; align-items: center; gap: 8px;
            letter-spacing: -0.02em;
        }
        .badge-regra {
            background: rgba(16, 185, 129, 0.15); color: var(--accent-green);
            font-size: 0.7rem; padding: 4px 10px; border-radius: 60px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .btn-menu-toggle {
            background: rgba(255,255,255,0.05); color: var(--text-primary);
            border: 1px solid var(--border-light); border-radius: 12px;
            width: 44px; height: 44px; font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-menu-toggle:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

        /* DRAWER (Menu Lateral) */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer-content {
            position: fixed; top: 0; right: -320px;
            width: 300px; height: 100%;
            background: var(--bg-secondary); border-left: 1px solid var(--border-light);
            z-index: 1001; box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 24px;
        }
        .drawer-content.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h2 { margin: 0; font-size: 1.5rem; color: var(--accent-gold); }
        .drawer-close { background: none; border: none; color: var(--text-secondary); font-size: 1.8rem; cursor: pointer; }
        
        .drawer-section h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 12px 0; }
        .drawer-btn {
            width: 100%; text-align: left; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-light); color: var(--text-primary);
            padding: 12px 16px; border-radius: 12px; font-family: 'Outfit', sans-serif;
            font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-bottom: 8px;
            transition: all 0.2s;
        }
        .drawer-btn:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
        .btn-magic { background: linear-gradient(135deg, rgba(245,158,11,0.2) 0%, rgba(245,158,11,0.05) 100%); border-color: rgba(245,158,11,0.3); color: var(--accent-gold-light); font-weight: bold; }
        .btn-salvar-drawer { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.05)); border-color: rgba(16,185,129,0.3); color: #34d399; }
        .btn-reset-drawer { background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.05)); border-color: rgba(239,68,68,0.3); color: #f87171; }

        /* MODAL CUSTOMIZADO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--bg-secondary); border: 1px solid var(--border-light);
            border-radius: 24px; padding: 24px; width: 90%; max-width: 400px;
            transform: scale(0.9) translateY(20px); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(0,0,0,0.5); text-align: center;
        }
        .modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
        .modal-title { font-size: 1.4rem; font-weight: 800; margin: 0 0 12px 0; color: var(--text-primary); }
        .modal-message { font-size: 0.95rem; color: var(--text-secondary); margin: 0 0 24px 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-btn {
            flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer;
            font-family: 'Outfit', sans-serif; font-size: 0.95rem; transition: all 0.2s;
        }
        .modal-btn-cancel { background: var(--bg-tertiary); color: var(--text-primary); }
        .modal-btn-cancel:hover { background: #475569; }
        .modal-btn-confirm { background: var(--accent-gold); color: #000; }
        .modal-btn-confirm:hover { background: var(--accent-gold-light); }

        /* TOASTS */
        #toast-container {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 3000; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            background: rgba(30, 41, 59, 0.95); color: var(--text-primary);
            padding: 12px 24px; border-radius: 50px; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light); font-size: 0.9rem; font-weight: 500;
            opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* CARDS E SANFONAS */
        .grupo-card, .fase-card {
            background: var(--bg-secondary); border: 1px solid var(--border-light);
            border-radius: var(--card-radius); margin-bottom: 20px;
            box-shadow: var(--shadow-md); transition: box-shadow 0.3s ease;
        }
        .grupo-card:hover, .fase-card:hover { box-shadow: var(--shadow-lg), var(--shadow-glow); border-color: rgba(245, 158, 11, 0.2); }
        .grupo-header, .fase-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; cursor: pointer; user-select: none; border-radius: var(--card-radius);
            transition: background 0.2s;
        }
        .grupo-titulo {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.02em;
        }
        .fase-title { font-size: 1.3rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .toggle-icon, .fase-toggle {
            font-size: 1rem; background: var(--bg-tertiary); width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            color: var(--text-secondary); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s, color 0.3s;
        }
        .grupo-header.open .toggle-icon, .fase-header.open .fase-toggle {
            transform: rotate(180deg); background: rgba(245, 158, 11, 0.15); color: var(--accent-gold);
        }

        .content-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .content-wrapper.open { grid-template-rows: 1fr; }
        .content-inner { overflow: hidden; padding: 0 16px; opacity: 0; transition: opacity 0.35s, padding 0.35s; }
        .content-wrapper.open > .content-inner { padding: 0 16px 20px 16px; opacity: 1; }

        /* LISTA E TABELAS COM FADE IN */
        .jogo-row, .confronto-mata, .tabela-class {
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .content-wrapper.open .jogo-row, .content-wrapper.open .confronto-mata, .content-wrapper.open .tabela-class {
            opacity: 1; transform: translateY(0);
        }
        /* Staggered delay for rows */
        .jogo-row:nth-child(1) { transition-delay: 0.05s; }
        .jogo-row:nth-child(2) { transition-delay: 0.1s; }
        .jogo-row:nth-child(3) { transition-delay: 0.15s; }
        .jogo-row:nth-child(4) { transition-delay: 0.2s; }
        .jogo-row:nth-child(5) { transition-delay: 0.25s; }
        .jogo-row:nth-child(6) { transition-delay: 0.3s; }

        .tabela-class { background: rgba(0,0,0,0.2); border-radius: 14px; padding: 2px; margin-bottom: 20px; overflow-x: auto; border: 1px solid var(--border-light); }
        .tabela-class table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.8rem; }
        .tabela-class th, .tabela-class td { padding: 10px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabela-class tbody tr:last-child td { border-bottom: none; }
        .tabela-class th { color: var(--text-secondary); font-weight: 500; font-size: 0.7rem; padding: 12px 4px; }
        .tabela-class tbody tr:nth-child(1) td:first-child, .tabela-class tbody tr:nth-child(2) td:first-child { color: var(--accent-green); font-weight: bold; }
        .tabela-class tbody tr:nth-child(3) td:first-child { color: var(--accent-gold); font-weight: bold; }
        .time-nome-tab { text-align: left; padding-left: 8px; font-weight: 500; white-space: nowrap; }

        .jogo-row {
            background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: 16px;
            margin-bottom: 12px; padding: 14px;
        }
        .jogo-info { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .times { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; min-width: 240px; }
        .time-nome { flex: 1; background: var(--bg-tertiary); padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .time-nome .flag-emoji { font-size: 1.4rem; line-height: 1; }
        .vs { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); }

        .placar-inputs, .mata-placar {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border-light);
        }
        .placar-inputs input, .mata-placar input {
            width: 44px; height: 48px; text-align: center; font-size: 1.4rem; font-weight: 700;
            font-family: 'Outfit', sans-serif; background: var(--bg-primary); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: var(--text-primary); transition: all 0.2s ease; -moz-appearance: textfield;
        }
        .placar-inputs input::-webkit-outer-spin-button, .placar-inputs input::-webkit-inner-spin-button,
        .mata-placar input::-webkit-outer-spin-button, .mata-placar input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .placar-inputs input:focus, .mata-placar input:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 3px var(--border-focus); background: #1e293b; }
        .placar-inputs span { color: var(--text-muted); font-weight: bold; }
        
        .info-jogo { font-size: 0.7rem; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; display: flex; justify-content: center; gap: 8px; }

        /* MATA-MATA */
        .confronto-mata { background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .confronto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .confronto-nome { font-weight: 700; color: var(--accent-gold); font-size: 0.75rem; }
        .info-mata { font-size: 0.65rem; color: var(--text-muted); }
        .mata-body { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .mata-times { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 200px; }
        .mata-time { background: var(--bg-tertiary); padding: 8px 14px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .mata-time .flag-emoji { font-size: 1.2rem; }
        .mata-placar span { display: none; }

        @media (max-width: 480px) {
            .header-wrapper h1 { font-size: 1.2rem; }
            .time-nome { font-size: 0.75rem; padding: 6px; }
            .placar-inputs input, .mata-placar input { width: 40px; height: 44px; font-size: 1.2rem; }
            .info-jogo { flex-direction: column; gap: 2px; }
            .mata-time { font-size: 0.8rem; }
            .drawer-content { width: 280px; }
        }
    </style>
</head>
<body>

<!-- HEADER PRINCIPAL -->
<div class="header-wrapper">
    <h1>🏆 Copa 2026 <span class="badge-regra">BRT</span></h1>
    <button class="btn-menu-toggle" id="btnOpenMenu" title="Menu">☰</button>
</div>

<div class="container">
    <div id="gruposContainer"></div>
    <div id="mataMataContainer" style="margin-top: 32px;"></div>
    
    <div style="text-align: center; margin: 40px 0; color: var(--text-muted); font-size: 0.8rem;">
        Copa do Mundo 2026 • Simulador Dinâmico
    </div>
</div>

<!-- DRAWER MENU -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer-content" id="drawerContent">
    <div class="drawer-header">
        <h2>Menu</h2>
        <button class="drawer-close" id="btnCloseMenu">✕</button>
    </div>
    
    <div class="drawer-section">
        <h3>🪄 Mágica</h3>
        <button class="drawer-btn btn-magic" id="btnSimularMagico">✨ Simular Sorteio Completo</button>
    </div>

    <div class="drawer-section">
        <h3>📂 Exibição</h3>
        <button class="drawer-btn" id="btnExpGroups">Abrir Todos os Grupos</button>
        <button class="drawer-btn" id="btnColGroups">Fechar Todos os Grupos</button>
        <button class="drawer-btn" id="btnExpFases">Abrir Todas as Fases</button>
        <button class="drawer-btn" id="btnColFases">Fechar Todas as Fases</button>
    </div>

    <div class="drawer-section">
        <h3>💾 Dados</h3>
        <button class="drawer-btn btn-salvar-drawer" id="btnSalvarDrawer">Salvar Palpites</button>
        <button class="drawer-btn btn-reset-drawer" id="btnResetDrawer">Limpar Tudo</button>
    </div>

    <div class="drawer-section">
        <h3>📱 Dicas</h3>
        <ul style="font-size:0.8rem; color:var(--text-secondary); padding-left:16px; margin:0;">
            <li style="margin-bottom:6px;">A classificação e chaves são automáticas.</li>
            <li>Seu progresso fica salvo no celular!</li>
        </ul>
    </div>
</div>

<!-- MODAL CONFIRM/ALERT -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3 class="modal-title" id="modalTitle">Título</h3>
        <p class="modal-message" id="modalMessage">Mensagem aqui</p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modalBtnCancel">Cancelar</button>
            <button class="modal-btn modal-btn-confirm" id="modalBtnConfirm">Confirmar</button>
        </div>
    </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<script>
    // --- UI HELPERS: Modais e Toasts ---
    function showToast(message, type="success") {
        let container = document.getElementById('toast-container');
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = (type==='success'?'<span style="color:var(--accent-green);font-size:1.2rem;">✓</span>':'<span>ℹ️</span>') + message;
        if(type==='success') toast.style.borderColor = 'rgba(16, 185, 129, 0.5)';
        container.appendChild(toast);
        setTimeout(()=>toast.classList.add('show'), 10);
        setTimeout(()=>{
            toast.classList.remove('show');
            setTimeout(()=>toast.remove(), 300);
        }, 3000);
    }

    function customConfirm(title, message, confirmText, cancelText, onConfirm) {
        let overlay = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = message;
        let btnConfirm = document.getElementById('modalBtnConfirm');
        let btnCancel = document.getElementById('modalBtnCancel');
        
        btnConfirm.innerText = confirmText;
        btnCancel.innerText = cancelText;
        btnCancel.style.display = cancelText ? 'block' : 'none';
        
        let newConfirm = btnConfirm.cloneNode(true);
        let newCancel = btnCancel.cloneNode(true);
        btnConfirm.parentNode.replaceChild(newConfirm, btnConfirm);
        btnCancel.parentNode.replaceChild(newCancel, btnCancel);
        
        newConfirm.addEventListener('click', () => { closeModal(); if(onConfirm) onConfirm(); });
        newCancel.addEventListener('click', () => { closeModal(); });
        
        overlay.classList.add('open');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    // --- DRAWER ---
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerContent = document.getElementById('drawerContent');
    document.getElementById('btnOpenMenu').addEventListener('click', () => {
        drawerOverlay.classList.add('open'); drawerContent.classList.add('open');
    });
    const closeDrawer = () => { drawerOverlay.classList.remove('open'); drawerContent.classList.remove('open'); };
    document.getElementById('btnCloseMenu').addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    // --- LOGICA DE DADOS ---
    const flags = {
        "México": "🇲🇽", "África do Sul": "🇿🇦", "Coreia do Sul": "🇰🇷", "Tchéquia": "🇨🇿",
        "Canadá": "🇨🇦", "Bósnia e Herzegovina": "🇧🇦", "Catar": "🇶🇦", "Suíça": "🇨🇭",
        "Brasil": "🇧🇷", "Marrocos": "🇲🇦", "Haiti": "🇭🇹", "Escócia": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "Estados Unidos": "🇺🇸", "Paraguai": "🇵🇾", "Austrália": "🇦🇺", "Turquia": "🇹🇷",
        "Alemanha": "🇩🇪", "Curaçao": "🇨🇼", "Costa do Marfim": "🇨🇮", "Equador": "🇪🇨",
        "Holanda": "🇳🇱", "Japão": "🇯🇵", "Suécia": "🇸🇪", "Tunísia": "🇹🇳",
        "Bélgica": "🇧🇪", "Egito": "🇪🇬", "Irã": "🇮🇷", "Nova Zelândia": "🇳🇿",
        "Espanha": "🇪🇸", "Cabo Verde": "🇨🇻", "Arábia Saudita": "🇸🇦", "Uruguai": "🇺🇾",
        "França": "🇫🇷", "Senegal": "🇸🇳", "Iraque": "🇮🇶", "Noruega": "🇳🇴",
        "Argentina": "🇦🇷", "Argélia": "🇩🇿", "Áustria": "🇦🇹", "Jordânia": "🇯🇴",
        "Portugal": "🇵🇹", "República Democrática do Congo": "🇨🇩", "Uzbequistão": "🇺🇿", "Colômbia": "🇨🇴",
        "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croácia": "🇭🇷", "Gana": "🇬🇭", "Panamá": "🇵🇦"
    };
    function getFlag(team) { return flags[team] || "🏁"; }
    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    const GRUPOS_REAIS = {
        A: ["México", "África do Sul", "Coreia do Sul", "Tchéquia"], B: ["Canadá", "Bósnia e Herzegovina", "Catar", "Suíça"],
        C: ["Brasil", "Marrocos", "Haiti", "Escócia"], D: ["Estados Unidos", "Paraguai", "Austrália", "Turquia"],
        E: ["Alemanha", "Curaçao", "Costa do Marfim", "Equador"], F: ["Holanda", "Japão", "Suécia", "Tunísia"],
        G: ["Bélgica", "Egito", "Irã", "Nova Zelândia"], H: ["Espanha", "Cabo Verde", "Arábia Saudita", "Uruguai"],
        I: ["França", "Senegal", "Iraque", "Noruega"], J: ["Argentina", "Argélia", "Áustria", "Jordânia"],
        K: ["Portugal", "República Democrática do Congo", "Uzbequistão", "Colômbia"], L: ["Inglaterra", "Croácia", "Gana", "Panamá"]
    };

    function toBrazilTimestamp(y, m, d, h, min) { return Date.UTC(y, m, d, h + 3, min || 0); }

    function construirJogosComData() {
        let jogosPorGrupo = {};
        for (let grupo in GRUPOS_REAIS) {
            let times = GRUPOS_REAIS[grupo];
            let jogos = [];
            for (let i=0; i<times.length; i++) {
                for (let j=i+1; j<times.length; j++) {
                    let timeCasa = times[i], timeFora = times[j];
                    // Simplificação para manter o código leve: datas base geradas logicamente (adaptável depois)
                    let md = ((i===0&&j===1)||(i===2&&j===3)) ? 0 : ((i===0&&j===2)||(i===1&&j===3)) ? 1 : 2;
                    let dia = 11 + (grupo.charCodeAt(0)-65)%4 + md*6; 
                    let horaBase = [14, 17, 21, 23][i % 4];
                    let dataHora = `${dia}/06 • ${horaBase}:00`;
                    let locais = ["MetLife Stadium", "SoFi Stadium", "AT&T Stadium", "NRG Stadium", "Levi's Stadium", "Hard Rock Stadium", "Estádio Azteca", "Estádio Akron"];
                    let local = locais[(grupo.charCodeAt(0)-65 + i + j) % locais.length];
                    jogos.push({ timeCasa, timeFora, golsCasa: "", golsFora: "", dataHora, local, timestamp: toBrazilTimestamp(2026,5,dia,horaBase,0) });
                }
            }
            jogos.sort((a,b) => a.timestamp - b.timestamp);
            jogosPorGrupo[grupo] = jogos;
        }
        return jogosPorGrupo;
    }

    let gruposData = {}; 
    let mataData = { oitavas: [], quartas: [], semifinais: [], terceiroLugar: {}, final: {} };
    let expansionState = { grupos: {A:true}, fases: {oitavas:true} }; // Por padrão deixa A e Oitavas aberto

    function initGruposData() {
        let jogosPorGrupo = construirJogosComData();
        for (let grupo in GRUPOS_REAIS) {
            gruposData[grupo] = { times: [...GRUPOS_REAIS[grupo]], jogos: jogosPorGrupo[grupo] || [] };
            if(expansionState.grupos[grupo] === undefined) expansionState.grupos[grupo] = false; // Fecha todos exceto A
        }
        mataData = {
            oitavas: Array(16).fill({}), quartas: Array(8).fill({}), semifinais: Array(4).fill({}),
            terceiroLugar: { time1: "", time2: "", gols1: "", gols2: "", info: "18/07 • Miami Gardens" },
            final: { time1: "", time2: "", gols1: "", gols2: "", info: "19/07 • New York/New Jersey" }
        };
    }

    function calcularTabelaGrupo(grupoLetra) {
        const grupo = gruposData[grupoLetra];
        if (!grupo) return [];
        let stats = {};
        grupo.times.forEach(time => { stats[time] = { pontos: 0, jogos: 0, vitorias: 0, gp: 0, gc: 0 }; });
        for (let j of grupo.jogos) {
            let gc = (j.golsCasa !== "" && !isNaN(parseInt(j.golsCasa))) ? parseInt(j.golsCasa) : null;
            let gf = (j.golsFora !== "" && !isNaN(parseInt(j.golsFora))) ? parseInt(j.golsFora) : null;
            if (gc !== null && gf !== null) {
                stats[j.timeCasa].jogos++; stats[j.timeFora].jogos++;
                stats[j.timeCasa].gp += gc; stats[j.timeCasa].gc += gf;
                stats[j.timeFora].gp += gf; stats[j.timeFora].gc += gc;
                if (gc > gf) { stats[j.timeCasa].pontos += 3; stats[j.timeCasa].vitorias++; }
                else if (gf > gc) { stats[j.timeFora].pontos += 3; stats[j.timeFora].vitorias++; }
                else { stats[j.timeCasa].pontos += 1; stats[j.timeFora].pontos += 1; }
            }
        }
        let lista = Object.keys(stats).map(time => ({ time, ...stats[time], sg: stats[time].gp - stats[time].gc }));
        lista.sort((a,b) => b.pontos - a.pontos || b.sg - a.sg || b.gp - a.gp);
        return lista;
    }

    function calcularClassificados() {
        let todos = [];
        for (let g in gruposData) {
            let tabela = calcularTabelaGrupo(g);
            for (let i=0; i<tabela.length; i++) todos.push({ grupo: g, posicao: i+1, time: tabela[i].time, pontos: tabela[i].pontos, sg: tabela[i].sg });
        }
        let p = todos.filter(t => t.posicao === 1);
        let s = todos.filter(t => t.posicao === 2);
        let t = todos.filter(t => t.posicao === 3).sort((a,b) => b.pontos - a.pontos || b.sg - a.sg).slice(0,8);
        return [...p, ...s, ...t];
    }

    function gerarOitavas(c) {
        let p = c.filter(x => x.posicao === 1).sort((a,b)=>a.grupo.localeCompare(b.grupo));
        let s = c.filter(x => x.posicao === 2).sort((a,b)=>a.grupo.localeCompare(b.grupo));
        let t = c.filter(x => x.posicao === 3).sort((a,b)=>a.grupo.localeCompare(b.grupo));
        let confrontos = [];
        for (let i=0; i<Math.min(p.length, t.length); i++) confrontos.push({ time1: p[i].time, time2: t[i].time });
        let idxSeg = 0;
        while (confrontos.length < 16 && idxSeg+1 < s.length) { confrontos.push({ time1: s[idxSeg].time, time2: s[idxSeg+1].time }); idxSeg+=2; }
        while (confrontos.length < 16) confrontos.push({ time1: "A Definir", time2: "A Definir" });
        let oitavas = [];
        for (let i=0; i<16; i++) {
            let antigo = mataData.oitavas[i] || {};
            oitavas.push({
                time1: confrontos[i].time1, time2: confrontos[i].time2,
                gols1: (antigo.time1 === confrontos[i].time1 && antigo.time2 === confrontos[i].time2) ? antigo.gols1 : "",
                gols2: (antigo.time1 === confrontos[i].time1 && antigo.time2 === confrontos[i].time2) ? antigo.gols2 : "",
                info: `Jogo ${i+1} • TBD`
            });
        }
        return oitavas;
    }

    function atualizarBracketCompleto() {
        let calcVenc = (j) => { let g1 = parseInt(j.gols1); let g2 = parseInt(j.gols2); return (!isNaN(g1) && !isNaN(g2)) ? (g1>g2?j.time1:g2>g1?j.time2:null) : null; };
        mataData.oitavas.forEach(j => j.vencedor = calcVenc(j));
        
        let q = [];
        for (let i=0;i<8;i++) { 
            let ex = mataData.quartas[i]||{}; 
            q.push({ time1: mataData.oitavas[i*2]?.vencedor || ex.time1 || "", time2: mataData.oitavas[i*2+1]?.vencedor || ex.time2 || "", gols1: ex.gols1||"", gols2: ex.gols2||"", info: `Quartas ${i+1}` }); 
        }
        q.forEach(j => j.vencedor = calcVenc(j)); mataData.quartas = q;

        let s = [];
        for (let i=0;i<4;i++) { 
            let ex = mataData.semifinais[i]||{}; 
            s.push({ time1: q[i*2]?.vencedor || ex.time1 || "", time2: q[i*2+1]?.vencedor || ex.time2 || "", gols1: ex.gols1||"", gols2: ex.gols2||"", info: `Semifinal ${i+1}` }); 
        }
        s.forEach(j => j.vencedor = calcVenc(j)); mataData.semifinais = s;

        let fe = mataData.final;
        mataData.final = { time1: s[0]?.vencedor || fe.time1, time2: s[1]?.vencedor || fe.time2, gols1: fe.gols1||"", gols2: fe.gols2||"", info: "19/07 • Final" };
        let te = mataData.terceiroLugar;
        let p1 = s[0]?.vencedor ? (s[0].time1===s[0].vencedor?s[0].time2:s[0].time1) : te.time1;
        let p2 = s[1]?.vencedor ? (s[1].time1===s[1].vencedor?s[1].time2:s[1].time1) : te.time2;
        mataData.terceiroLugar = { time1: p1, time2: p2, gols1: te.gols1||"", gols2: te.gols2||"", info: "18/07 • 3º Lugar" };
    }

    function regenerarOitavasPorGrupos() { mataData.oitavas = gerarOitavas(calcularClassificados()); atualizarBracketCompleto(); }

    // --- RENDER ---
    function renderTabelaGrupo(letra) {
        let t = calcularTabelaGrupo(letra);
        if (!t.length) return '';
        return `<div class="tabela-class"><table><thead><tr><th>#</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody>${
            t.map((r,i)=>`<tr><td>${i+1}</td><td class="time-nome-tab"><span class="flag-emoji">${getFlag(r.time)}</span> ${escapeHtml(r.time)}</td><td>${r.pontos}</td><td>${r.jogos}</td><td>${r.vitorias}</td><td>${r.gp}</td><td>${r.gc}</td><td>${r.sg}</td></tr>`).join('')
        }</tbody></table></div>`;
    }

    function renderGrupos() {
        let c = document.getElementById("gruposContainer");
        let html = "";
        for (let letra of Object.keys(GRUPOS_REAIS)) {
            let grupo = gruposData[letra];
            let open = expansionState.grupos[letra] ? 'open' : '';
            html += `<div class="grupo-card">
                        <div class="grupo-header ${open}" data-toggle-grupo="${letra}">
                            <span class="grupo-titulo">Grupo ${letra}</span><span class="toggle-icon">▼</span>
                        </div>
                        <div class="content-wrapper ${open}" data-grupo-content="${letra}">
                            <div class="content-inner">${renderTabelaGrupo(letra)}<div class="jogos-list">`;
            grupo.jogos.forEach((j, idx) => {
                let d = j.dataHora.split('•');
                html += `<div class="jogo-row">
                            <div class="jogo-info">
                                <div class="times">
                                    <div class="time-nome"><span class="flag-emoji">${getFlag(j.timeCasa)}</span>${escapeHtml(j.timeCasa)}</div>
                                    <span class="vs">VS</span>
                                    <div class="time-nome"><span class="flag-emoji">${getFlag(j.timeFora)}</span>${escapeHtml(j.timeFora)}</div>
                                </div>
                                <div class="placar-inputs">
                                    <input type="number" value="${j.golsCasa}" class="gol-casa" data-grupo="${letra}" data-jogo="${idx}" data-lado="casa">
                                    <span>:</span>
                                    <input type="number" value="${j.golsFora}" class="gol-fora" data-grupo="${letra}" data-jogo="${idx}" data-lado="fora">
                                </div>
                            </div>
                            <div class="info-jogo"><span>📅 ${d[0]}</span><span>⏰ ${d[1]}</span><span>🏟️ ${j.local}</span></div>
                        </div>`;
            });
            html += `</div></div></div></div>`;
        }
        c.innerHTML = html;
    }

    function renderMataMata() {
        let c = document.getElementById("mataMataContainer");
        let fases = [
            { id:"oitavas", t:"⚔️ OITAVAS DE FINAL", d:mataData.oitavas }, { id:"quartas", t:"🏆 QUARTAS DE FINAL", d:mataData.quartas },
            { id:"semifinais", t:"🥇 SEMIFINAIS", d:mataData.semifinais }, { id:"terceiro", t:"🥉 3º LUGAR", d:[mataData.terceiroLugar] },
            { id:"final", t:"🏆 FINAL", d:[mataData.final] }
        ];
        let html = "";
        fases.forEach(f => {
            let open = expansionState.fases[f.id] ? 'open' : '';
            html += `<div class="fase-card">
                        <div class="fase-header ${open}" data-toggle-fase="${f.id}">
                            <span class="fase-title">${f.t}</span><span class="fase-toggle">▼</span>
                        </div>
                        <div class="content-wrapper ${open}" data-fase-content="${f.id}"><div class="content-inner">`;
            f.d.forEach((j, i) => {
                let p1 = j.time1?`<span class="flag-emoji">${getFlag(j.time1)}</span> ${escapeHtml(j.time1)}`:"A Definir";
                let p2 = j.time2?`<span class="flag-emoji">${getFlag(j.time2)}</span> ${escapeHtml(j.time2)}`:"A Definir";
                let d = (j.info || '').split('•');
                html += `<div class="confronto-mata">
                            <div class="confronto-header"><span class="confronto-nome">${f.id.toUpperCase()} ${f.d.length>1?i+1:''}</span><span class="info-mata">📅 ${d[0]} 🏟️ ${d[1]||''}</span></div>
                            <div class="mata-body">
                                <div class="mata-times"><div class="mata-time">${p1}</div><div class="mata-time">${p2}</div></div>
                                <div class="mata-placar">
                                    <input type="number" value="${j.gols1}" class="mata-gol1" data-fase="${f.id}" data-idx="${i}" data-lado="1">
                                    <input type="number" value="${j.gols2}" class="mata-gol2" data-fase="${f.id}" data-idx="${i}" data-lado="2">
                                </div>
                            </div>
                        </div>`;
            });
            html += `</div></div></div>`;
        });
        c.innerHTML = html;
    }

    function renderCompleto() { 
        renderGrupos(); renderMataMata(); 
        document.querySelectorAll('.gol-casa, .gol-fora').forEach(i => i.addEventListener('change', e => {
            let v = e.target.value; if(v!=='' && v<0) v=0;
            if(e.target.dataset.lado==='casa') gruposData[e.target.dataset.grupo].jogos[e.target.dataset.jogo].golsCasa = v;
            else gruposData[e.target.dataset.grupo].jogos[e.target.dataset.jogo].golsFora = v;
            regenerarOitavasPorGrupos(); salvarStorage(); renderCompleto();
        }));
        document.querySelectorAll('.mata-gol1, .mata-gol2').forEach(i => i.addEventListener('change', e => {
            let v = e.target.value; if(v!=='' && v<0) v=0; let f = e.target.dataset.fase; let idx = e.target.dataset.idx;
            let arr = f==='terceiro'?[mataData.terceiroLugar]:f==='final'?[mataData.final]:mataData[f];
            if(e.target.dataset.lado==='1') arr[idx].gols1 = v; else arr[idx].gols2 = v;
            atualizarBracketCompleto(); salvarStorage(); renderCompleto();
        }));

        // Togglers com sanfona clássica (abre uma por vez)
        document.querySelectorAll('[data-toggle-grupo]').forEach(h => h.addEventListener('click', function(e) {
            let g = this.dataset.toggleGrupo; 
            let w = document.querySelector(`[data-grupo-content="${g}"]`);
            
            let wasOpen = w.classList.contains('open');

            // Fechar todas as outras sanfonas de grupos
            document.querySelectorAll('[data-grupo-content]').forEach(ow => {
                ow.classList.remove('open');
                expansionState.grupos[ow.dataset.grupoContent] = false;
                if(ow.previousElementSibling) ow.previousElementSibling.classList.remove('open');
            });

            // Se não estava aberta, abre a atual
            if (!wasOpen) {
                w.classList.add('open'); 
                this.classList.add('open');
                expansionState.grupos[g] = true;
                setTimeout(() => this.scrollIntoView({behavior:'smooth', block:'start'}), 300);
            }
            
            salvarStorage();
        }));

        document.querySelectorAll('[data-toggle-fase]').forEach(h => h.addEventListener('click', function(e) {
            let f = this.dataset.toggleFase; 
            let w = document.querySelector(`[data-fase-content="${f}"]`);

            let wasOpen = w.classList.contains('open');

            // Fechar todas as outras fases
            document.querySelectorAll('[data-fase-content]').forEach(ow => {
                ow.classList.remove('open');
                expansionState.fases[ow.dataset.faseContent] = false;
                if(ow.previousElementSibling) ow.previousElementSibling.classList.remove('open');
            });

            // Se não estava aberta, abre a atual
            if (!wasOpen) {
                w.classList.add('open'); 
                this.classList.add('open');
                expansionState.fases[f] = true;
                setTimeout(() => this.scrollIntoView({behavior:'smooth', block:'start'}), 300);
            }
            
            salvarStorage();
        }));
    }

    function salvarStorage() { localStorage.setItem("copa2026_evo", JSON.stringify({ gruposData, mataData, expansionState })); }
    function carregarStorage() { 
        let s = localStorage.getItem("copa2026_evo"); 
        let isNovo = true;
        if(s) { 
            try { 
                let d = JSON.parse(s); 
                gruposData = d.gruposData; 
                mataData = d.mataData; 
                expansionState = d.expansionState || {grupos:{A:true},fases:{oitavas:true}}; 
                isNovo = false; 
            } catch(e){} 
        } 
        
        if (isNovo || !gruposData || Object.keys(gruposData).length === 0) {
            initGruposData(); 
            regenerarOitavasPorGrupos(); // Popula oitavas na primeira vez
        } else {
            atualizarBracketCompleto(); 
        }
    }

    // --- ACOES DO DRAWER ---
    document.getElementById('btnResetDrawer').addEventListener('click', () => {
        closeDrawer();
        customConfirm("⚠️ Limpar Resultados", "Tem certeza que deseja apagar todos os palpites?", "Apagar Tudo", "Cancelar", () => {
            initGruposData(); regenerarOitavasPorGrupos(); salvarStorage(); renderCompleto();
            showToast("Resultados apagados.", "info");
        });
    });

    document.getElementById('btnSalvarDrawer').addEventListener('click', () => {
        closeDrawer(); salvarStorage(); showToast("Palpites salvos no dispositivo!");
    });

    document.getElementById('btnSimularMagico').addEventListener('click', () => {
        closeDrawer();
        customConfirm("🪄 Simulação Mágica", "Preencher todos os jogos vazios com resultados aleatórios?", "Simular!", "Cancelar", () => {
            for(let g in gruposData) gruposData[g].jogos.forEach(j => { if(j.golsCasa==="") j.golsCasa=Math.floor(Math.random()*4); if(j.golsFora==="") j.golsFora=Math.floor(Math.random()*4); });
            regenerarOitavasPorGrupos();
            let simularMata = (arr) => arr.forEach(j => { if(j.gols1==="") j.gols1=Math.floor(Math.random()*4); if(j.gols2==="") j.gols2=Math.floor(Math.random()*4); if(j.gols1===j.gols2) j.gols1++; });
            simularMata(mataData.oitavas); atualizarBracketCompleto();
            simularMata(mataData.quartas); atualizarBracketCompleto();
            simularMata(mataData.semifinais); atualizarBracketCompleto();
            if(mataData.final.gols1==="") { mataData.final.gols1=Math.floor(Math.random()*4); mataData.final.gols2=Math.floor(Math.random()*4); if(mataData.final.gols1===mataData.final.gols2) mataData.final.gols1++; }
            if(mataData.terceiroLugar.gols1==="") { mataData.terceiroLugar.gols1=Math.floor(Math.random()*4); mataData.terceiroLugar.gols2=Math.floor(Math.random()*4); if(mataData.terceiroLugar.gols1===mataData.terceiroLugar.gols2) mataData.terceiroLugar.gols1++; }
            atualizarBracketCompleto(); salvarStorage(); renderCompleto();
            showToast("Simulação mágica concluída!");
            // Expande o Mata-Mata final pra pessoa ver
            expansionState.fases = {oitavas:true, quartas:true, semifinais:true, terceiro:true, final:true};
            renderCompleto();
            document.getElementById("mataMataContainer").scrollIntoView({behavior:'smooth'});
        });
    });

    const setExp = (obj, val) => { for(let k in obj) obj[k] = val; };
    document.getElementById('btnExpGroups').addEventListener('click', () => { closeDrawer(); setExp(expansionState.grupos, true); salvarStorage(); renderCompleto(); });
    document.getElementById('btnColGroups').addEventListener('click', () => { closeDrawer(); setExp(expansionState.grupos, false); salvarStorage(); renderCompleto(); });
    document.getElementById('btnExpFases').addEventListener('click', () => { closeDrawer(); setExp(expansionState.fases, true); salvarStorage(); renderCompleto(); });
    document.getElementById('btnColFases').addEventListener('click', () => { closeDrawer(); setExp(expansionState.fases, false); salvarStorage(); renderCompleto(); });

    // Iniciar
    carregarStorage();
    renderCompleto();
</script>
</body>
</html>
